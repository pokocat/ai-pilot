<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Logo Preview — Concepts</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    padding: 2rem;
    transition: background-color 0.3s, color 0.3s;
  }
  body.light { background: #f5f5f5; color: #333; }
  body.dark { background: #1a1a1a; color: #eee; }
  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 2rem;
  }
  h1 { font-size: 1.5rem; font-weight: 600; }
  .toggle {
    padding: 0.5rem 1rem;
    border: 1px solid currentColor;
    border-radius: 6px;
    background: transparent;
    color: inherit;
    cursor: pointer;
    font-size: 0.875rem;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 1.5rem;
  }
  .card {
    border: 1px solid rgba(128, 128, 128, 0.3);
    border-radius: 12px;
    overflow: hidden;
  }
  .card-img {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    min-height: 240px;
  }
  body.light .card-img { background: #fff; }
  body.dark .card-img { background: #2a2a2a; }
  .card-img img {
    max-width: 100%;
    max-height: 200px;
  }
  .card-label {
    padding: 0.75rem 1rem;
    font-size: 0.875rem;
    font-weight: 500;
    border-top: 1px solid rgba(128, 128, 128, 0.3);
  }
  body.light .card-label { background: #fafafa; }
  body.dark .card-label { background: #222; }
</style>
</head>
<body class="light">
  <div class="header">
    <h1>Logo Preview — Concepts</h1>
    <button class="toggle" onclick="document.body.classList.toggle('dark'); document.body.classList.toggle('light'); this.textContent = document.body.classList.contains('dark') ? '☀️ Light' : '🌙 Dark';">🌙 Dark</button>
  </div>
  <div class="grid">
    <div class="card">
      <div class="card-img">
        <img src="concepts/concept-1.svg" alt="concept-1">
      </div>
      <div class="card-label">concept-1 · 朱印篆刻 Seal</div>
    </div>
    <div class="card">
      <div class="card-img">
        <img src="concepts/concept-2.svg" alt="concept-2">
      </div>
      <div class="card-label">concept-2 · 羽扇 Feather Fan</div>
    </div>
    <div class="card">
      <div class="card-img">
        <img src="concepts/concept-3.svg" alt="concept-3">
      </div>
      <div class="card-label">concept-3 · 书法「军」Brush Monogram</div>
    </div>
    <div class="card">
      <div class="card-img">
        <img src="concepts/concept-4.svg" alt="concept-4">
      </div>
      <div class="card-label">concept-4 · 围棋 Go Strategy</div>
    </div>
    <div class="card">
      <div class="card-img">
        <img src="concepts/concept-5.svg" alt="concept-5">
      </div>
      <div class="card-label">concept-5 · 罗盘星 Compass Star</div>
    </div>
  </div>
</body>
</html>
