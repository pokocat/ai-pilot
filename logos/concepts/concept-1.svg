<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="军师 Junshi seal logo">
  <g id="bg">
    <rect x="0" y="0" width="512" height="512" fill="#FAF7F0"/>
  </g>
  <g id="seal">
    <rect x="76" y="76" width="360" height="360" rx="44" ry="44" fill="#9E2B25"/>
    <rect x="100" y="100" width="312" height="312" rx="26" ry="26" fill="none" stroke="#A07D2C" stroke-width="10"/>
  </g>
  <g id="glyph" fill="#FAF7F0">
    <!-- Seal-script 军 carved as negative-space strokes (阴文) -->
    <!-- 冖 top cover: roof bar + downward shoulders -->
    <rect x="152" y="150" width="208" height="22"/>
    <rect x="152" y="150" width="22" height="40"/>
    <rect x="338" y="150" width="22" height="40"/>
    <!-- 车 component: top horizontal -->
    <rect x="176" y="210" width="160" height="22"/>
    <!-- enclosing box (口) of 车 -->
    <rect x="206" y="232" width="100" height="22"/>
    <rect x="206" y="232" width="22" height="112"/>
    <rect x="284" y="232" width="22" height="112"/>
    <rect x="206" y="322" width="100" height="22"/>
    <!-- inner middle bar of 车 -->
    <rect x="206" y="277" width="100" height="22"/>
    <!-- central vertical stem running through -->
    <rect x="245" y="210" width="22" height="172"/>
    <!-- bottom horizontal (long base stroke) -->
    <rect x="160" y="382" width="192" height="24"/>
  </g>
</svg>
