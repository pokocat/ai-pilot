name: Server Integration

on:
  pull_request:
  push:
    branches:
      - main
      - master
      - feat/**
      - codex/**

jobs:
  server:
    name: Backend regression
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: junshi_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --tmpfs /var/lib/postgresql/data:rw
          --health-cmd "pg_isready -U postgres -d junshi_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    defaults:
      run:
        working-directory: server
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/junshi_test?schema=public
      AI_PROVIDER: mock
      PGVECTOR_ENABLED: "false"
      MODERATION_ENABLED: "true"
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: server/package-lock.json
      - run: npm ci
      - run: npx prisma generate
      - run: npm run build
      - run: npx prisma db push --skip-generate
      - run: npm test
